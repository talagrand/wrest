name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  MSRV: '1.90'

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # -- Windows - native WinHTTP backend -----------------------
          - { name: 'win / msrv / no-defaults',   os: windows-latest, rust: msrv,   mode: no-defaults }
          - { name: 'win / msrv / defaults',       os: windows-latest, rust: msrv,   mode: defaults }
          - { name: 'win / stable / no-defaults',  os: windows-latest, rust: stable, mode: no-defaults }
          - { name: 'win / stable / all-native',   os: windows-latest, rust: stable, mode: all, doc-tests: true }
          # -- Windows - reqwest passthrough (via always-reqwest) -----
          - { name: 'win / stable / reqwest',      os: windows-latest, rust: stable, mode: all-reqwest }
          # -- Linux - reqwest passthrough (implicit, no always-reqwest needed)
          - { name: 'linux / msrv / no-defaults',  os: ubuntu-latest,  rust: msrv,   mode: no-defaults }
          - { name: 'linux / msrv / defaults',      os: ubuntu-latest,  rust: msrv,   mode: defaults }
          - { name: 'linux / stable / no-defaults', os: ubuntu-latest,  rust: stable, mode: no-defaults }
          - { name: 'linux / stable / all',         os: ubuntu-latest,  rust: stable, mode: all }
          # -- macOS - reqwest passthrough (same code as Linux; guards macOS-specific regressions)
          - { name: 'mac / stable / all',           os: macos-latest,   rust: stable, mode: all }

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Resolve matrix parameters
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        # Toolchain
        rust="${{ matrix.rust }}"
        [[ "$rust" == "msrv" ]] && rust="$MSRV"
        echo "toolchain=$rust" >> "$GITHUB_OUTPUT"

        # Cargo feature flags
        case "${{ matrix.mode }}" in
          no-defaults)  echo "flags=--no-default-features" ;;
          defaults)     echo "flags=" ;;
          all)          echo "flags=--features __all-native-features" ;;
          all-reqwest)  echo "flags=--features __all-native-features,always-reqwest" ;;
        esac >> "$GITHUB_OUTPUT"

        if [[ "${{ matrix.rust }}" == "stable" ]]; then
          echo "should-run-full-checks=true" >> "$GITHUB_OUTPUT"
        else
          echo "should-run-full-checks=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ steps.resolve.outputs.toolchain }}
        components: ${{ steps.resolve.outputs.should-run-full-checks == 'true' && 'clippy' || '' }}

    - name: Start go-httpbin
      # Local tests just hit httpbin.org for simplicity, but that introduces a source
      # of flakiness. For CI, we run a local instance of the service for reliability.
      # Note some tests continue to hit live end-points that cannot be covered by httpbin
      # (namely SSL and proxy tests), but experimentally these are far more reliable.
      if: steps.resolve.outputs.should-run-full-checks == 'true'
      uses: ./.github/actions/start-httpbin

    - name: Run clippy
      if: steps.resolve.outputs.should-run-full-checks == 'true'
      run: cargo clippy --all-targets ${{ steps.resolve.outputs.flags }} -- -D warnings

    - name: Run tests
      if: steps.resolve.outputs.should-run-full-checks == 'true'
      run: cargo test --all-targets ${{ steps.resolve.outputs.flags }} --verbose

    - name: Diagnose failure
      if: failure() && steps.resolve.outputs.should-run-full-checks == 'true'
      shell: bash
      run: |
        echo "::group::go-httpbin log"
        cat httpbin.log || echo "(no httpbin.log found)"
        echo "::endgroup::"

    - name: Check library (MSRV)
      # MSRV verifies the library still compiles on the stated minimum
      # toolchain.  We use `cargo check` (not `cargo test`) so MSRV is
      # bound by the public API, not by dev-dependencies.
      if: steps.resolve.outputs.should-run-full-checks != 'true'
      run: cargo check ${{ steps.resolve.outputs.flags }} --verbose

    - name: Run doc tests
      if: matrix.doc-tests
      run: cargo test --doc --features __all-native-features

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt

    - name: Check formatting
      run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: '-D warnings'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Build documentation
      run: cargo doc --features __all-native-features --no-deps

  coverage:
    name: Coverage
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # tokenless Codecov upload via OIDC

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Start go-httpbin
      uses: ./.github/actions/start-httpbin

    - name: Generate coverage
      run: cargo llvm-cov --features __all-native-features --lcov --output-path lcov.info

    - name: Diagnose failure
      if: failure()
      shell: bash
      run: |
        echo "::group::go-httpbin log"
        cat httpbin.log || echo "(no httpbin.log found)"
        echo "::endgroup::"

    - name: Upload to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: lcov.info
        fail_ci_if_error: true
        use_oidc: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit

    - name: Run security audit
      run: cargo audit

  minimal-versions:
    name: Minimal Versions (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: native,  os: windows-latest }
          - { name: reqwest, os: ubuntu-latest }

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust nightly
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly

    - name: Install cargo-hack and cargo-minimal-versions
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-hack,cargo-minimal-versions

    - name: Check minimal versions
      shell: bash
      run: cargo +nightly minimal-versions check --direct --features __all-native-features

  typos:
    name: Typos
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install typos
      uses: taiki-e/install-action@v2
      with:
        tool: typos-cli

    - name: Run typos
      # Config lives in `_typos.toml` at the repo root.
      run: typos

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run actionlint
      uses: raven-actions/actionlint@v2

  ci-success:
    # Single required status check for branch protection.  Add new jobs to
    # `needs:` rather than re-listing each one in the branch protection rule.
    name: CI Success
    if: always()
    runs-on: ubuntu-latest
    needs: [test, fmt, typos, workflow-lint, docs, coverage, security, minimal-versions]
    steps:
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs failed or were cancelled."
          exit 1

